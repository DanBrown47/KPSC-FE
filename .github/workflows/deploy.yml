name: Frontend Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }} # Use password instead of key
          port: ${{ secrets.SERVER_PORT }}     # Your custom port
          script_stop: true                    # Stops the job if a command fails
          script: |
            cd /home/pmdweb/psc/frontend
            git pull origin main


            #_____________FRONTEND BUILD AND DEPLOYMENT_____________#
            npm install
            npm run build

            #remove old dist files
            cd /var/www/psc/frontend
            echo "${{ secrets.SERVER_PASS }}" | sudo -S rm -rf *

            #copy new dist files
            echo "${{ secrets.SERVER_PASS }}" | sudo -S cp -r /home/pmdweb/psc/frontend/dist/* /var/www/psc/frontend/

            # Restart the server
            echo "${{ secrets.SERVER_PASS }}" | sudo -S systemctl reload nginx